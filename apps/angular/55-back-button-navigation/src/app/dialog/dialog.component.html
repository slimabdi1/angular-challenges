<h2 mat-dialog-title>{{ data?.title ?? 'Delete file' }}</h2>
<mat-dialog-content>
  {{ data?.content ?? 'Would you like to delete cat.jpeg?' }}
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-button mat-dialog-close>
    {{ data?.cancelLabel ?? 'No' }}
  </button>
  <button mat-button mat-dialog-close cdkFocusInitial>
    {{ data?.confirmLabel ?? 'Ok' }}
  </button>
</mat-dialog-actions>
